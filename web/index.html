<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI 내사보고서 자동작성기</title>
  <style>
    :root {
      --bg: #f3f6fb;
      --panel: #fff;
      --line: #d8dfeb;
      --text: #152033;
      --muted: #5a6778;
      --brand: #0067aa;
      --brand2: #0c7fc8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Malgun Gothic", "Noto Sans KR", sans-serif;
      color: var(--text);
      background: radial-gradient(900px 600px at 0% 0%, #e7f1ff 0%, var(--bg) 40%, #ebf8ee 100%);
    }
    .wrap { max-width: 1380px; margin: 0 auto; padding: 16px; }
    .top {
      display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
      background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 12px;
    }
    .muted { color: var(--muted); font-size: 13px; }
    .badge { border: 1px solid #c9d7ea; border-radius: 999px; padding: 3px 10px; font-size: 12px; background: #f8fbff; }
    .grid { margin-top: 12px; display: grid; grid-template-columns: 1fr 1.15fr; gap: 12px; }
    .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 12px; }
    .panel h2 { margin: 0 0 10px; font-size: 17px; }
    .box { border: 1px solid var(--line); border-radius: 10px; padding: 10px; background: #fcfdff; }
    .fields { display: grid; gap: 8px; margin-top: 10px; }
    .field { border: 1px solid var(--line); border-radius: 10px; padding: 8px; background: #fff; }
    .field label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
    .field input, .field textarea, button {
      width: 100%; border: 1px solid var(--line); border-radius: 8px; padding: 8px 10px; font: inherit;
    }
    .field textarea { min-height: 90px; resize: vertical; }
    button { cursor: pointer; background: #fff; }
    .btns { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
    .primary { background: var(--brand); color: #fff; border-color: var(--brand); }
    .primary:hover { background: var(--brand2); }
    .facts, .missing, .preview {
      border: 1px solid var(--line); border-radius: 10px; padding: 10px; background: #fff;
      white-space: pre-wrap; line-height: 1.45;
    }
    .facts, .missing { min-height: 130px; max-height: 220px; overflow: auto; }
    .preview { width: 100%; min-height: 520px; resize: vertical; font-family: Consolas, monospace; font-size: 13px; }
    .errors { color: #b42318; font-size: 13px; white-space: pre-wrap; }
    @media (max-width: 980px) { .grid { grid-template-columns: 1fr; } .preview { min-height: 320px; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <strong>AI 내사보고서 자동작성기</strong>
      <span class="muted">정보를 묶음 단위로 입력하면 프로그램이 AI로 정리/근거탐색하여 보고서 초안을 만듭니다.</span>
      <span style="flex:1"></span>
      <span id="aiState" class="badge">AI 연결 확인 중...</span>
      <span id="progress" class="badge">진행률 0/0</span>
      <button id="btnNew">새 세션</button>
    </div>

    <div class="grid">
      <section class="panel">
        <h2 id="groupTitle">입력 그룹</h2>
        <div id="instruction" class="box">안내를 불러오는 중...</div>
        <div id="errors" class="errors"></div>
        <div id="followups" class="box muted" style="display:none;"></div>
        <div id="fields" class="fields"></div>
        <div class="btns">
          <button id="btnSubmit" class="primary">이 그룹 저장하고 다음으로</button>
          <button id="btnReport">보고서 초안 생성</button>
        </div>
        <h2 style="margin-top:14px;">AI 선별 사실</h2>
        <div id="facts" class="facts">아직 없음</div>
      </section>

      <section class="panel">
        <h2>보고서 미리보기 (Markdown)</h2>
        <textarea id="preview" class="preview" readonly></textarea>
        <div class="btns">
          <button id="btnDownload" class="primary">Markdown 다운로드</button>
        </div>
        <h2 style="margin-top:14px;">누락 항목</h2>
        <div id="missing" class="missing">보고서 생성 후 표시됩니다.</div>
      </section>
    </div>
  </div>

  <script>
    const state = { sessionId: "", group: null, model: "", aiEnabled: false };
    const $ = (id) => document.getElementById(id);

    if (location.protocol === "file:") {
      alert("이 페이지는 파일 직접열기(file://)가 아니라 웹서버로 실행해야 합니다.\n\nPowerShell에서 .\\run_내사보고서자동작성기.ps1 실행 후\nhttp://127.0.0.1:8765/web/index.html 로 접속하세요.");
    }

    async function postJson(url, body) {
      const res = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body || {}),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return await res.json();
    }

    function renderGroup(group, values = {}) {
      state.group = group;
      $("errors").textContent = "";
      if (!group) {
        $("groupTitle").textContent = "모든 입력 완료";
        $("fields").innerHTML = "";
        $("instruction").textContent = "입력이 완료되었습니다. 보고서 초안 생성을 눌러주세요.";
        return;
      }
      $("groupTitle").textContent = group.title;
      $("fields").innerHTML = "";
      for (const f of group.fields) {
        const isLong = /(주장|증거|사유|특이사항)/.test(f.label);
        const html = isLong
          ? `<div class="field"><label>${f.label}</label><textarea data-key="${f.key}" placeholder="${f.placeholder || ''}"></textarea></div>`
          : `<div class="field"><label>${f.label}</label><input data-key="${f.key}" placeholder="${f.placeholder || ''}" /></div>`;
        $("fields").insertAdjacentHTML("beforeend", html);
      }
      for (const el of $("fields").querySelectorAll("[data-key]")) {
        const key = el.dataset.key;
        if (Object.prototype.hasOwnProperty.call(values, key)) {
          el.value = values[key] || "";
        }
      }
    }

    function collectAnswers() {
      const answers = {};
      for (const el of $("fields").querySelectorAll("[data-key]")) {
        answers[el.dataset.key] = (el.value || "").trim();
      }
      return answers;
    }

    async function startSession() {
      $("preview").value = "";
      $("facts").textContent = "아직 없음";
      $("missing").textContent = "보고서 생성 후 표시됩니다.";
      const data = await postJson("/api/session", {});
      state.sessionId = data.session_id;
      state.aiEnabled = !!data.ai_enabled;
      state.model = data.model || "";
      $("aiState").textContent = state.aiEnabled ? `AI 연결됨 (${state.model})` : "AI 키 미설정(규칙+부분 AI)";
      $("progress").textContent = `진행률 ${data.progress || "0/0"}`;
      $("instruction").textContent = data.instruction || "이 그룹을 입력해주세요.";
      renderGroup(data.group || null, data.current_values || {});
      $("followups").style.display = "none";
      $("followups").textContent = "";
    }

    async function submitGroup() {
      if (!state.sessionId || !state.group) return;
      const data = await postJson("/api/group_submit", {
        session_id: state.sessionId,
        answers: collectAnswers(),
      });
      $("progress").textContent = `진행률 ${data.progress || "0/0"}`;
      if (data.errors && data.errors.length) {
        $("errors").textContent = data.errors.map((e) => `- ${e}`).join("\n");
        return;
      }
      $("errors").textContent = "";
      $("instruction").textContent = data.instruction || "다음 그룹을 입력해주세요.";
      renderGroup(data.group || null, data.current_values || {});
      if (data.need_more_info && data.followup_questions && data.followup_questions.length) {
        $("followups").style.display = "block";
        $("followups").textContent =
          "추가 질문:\n" + data.followup_questions.map((q) => `- ${q}`).join("\n");
      } else {
        $("followups").style.display = "none";
        $("followups").textContent = "";
      }
      if (data.curated_facts && data.curated_facts.length) {
        $("facts").textContent = data.curated_facts.map((x) => `- ${x}`).join("\n");
      }
    }

    async function buildReport() {
      if (!state.sessionId) return;
      const data = await postJson("/api/report", { session_id: state.sessionId });
      $("preview").value = data.markdown || "";
      if (data.missing && data.missing.length) {
        $("missing").textContent = data.missing.map((k) => `- ${k}`).join("\n");
      } else {
        $("missing").textContent = "누락 항목 없음";
      }
    }

    function downloadMarkdown() {
      const text = $("preview").value.trim();
      if (!text) { alert("먼저 보고서를 생성해주세요."); return; }
      const blob = new Blob([text], { type: "text/markdown;charset=utf-8" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `내사보고서_${new Date().toISOString().slice(0,10)}.md`;
      a.click();
      URL.revokeObjectURL(a.href);
    }

    $("btnNew").addEventListener("click", () => startSession().catch((e) => alert(`오류: ${e.message}`)));
    $("btnSubmit").addEventListener("click", () => submitGroup().catch((e) => alert(`오류: ${e.message}`)));
    $("btnReport").addEventListener("click", () => buildReport().catch((e) => alert(`오류: ${e.message}`)));
    $("btnDownload").addEventListener("click", downloadMarkdown);

    startSession().catch((e) => alert(`초기화 오류: ${e.message}`));
  </script>
</body>
</html>
